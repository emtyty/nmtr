appId: com.nmtr.app
productName: nmtr
copyright: "Copyright © 2024"

directories:
  buildResources: build
  output: dist-release

files:
  - out/**/*
  - "!out/**/*.map"
  - package.json
  - node_modules/pingus/**/*
  - node_modules/raw-socket/**/*
  - node_modules/@amuject/**/*
  - node_modules/koffi/**/*
  - node_modules/p-queue/**/*
  - node_modules/p-limit/**/*
  - node_modules/electron-store/**/*
  - node_modules/lru-cache/**/*

extraResources:
  - from: resources/
    to: .
    filter: ["tray-icon.png"]

asar: true
asarUnpack:
  - node_modules/pingus/**/*
  - node_modules/raw-socket/**/*
  - node_modules/@amuject/**/*
  - node_modules/koffi/**/*

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico
  requestedExecutionLevel: requireAdministrator

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: nmtr

publish:
  provider: github
  owner: placeholder
  repo: nmtr
  releaseType: release
